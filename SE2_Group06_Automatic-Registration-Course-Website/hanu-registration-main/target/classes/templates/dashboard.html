<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - HANU Auto Reg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .filter-section { background-color: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #e9ecef; }
        .available-slots { color: #28a745; font-weight: bold; }
        .full-slots { color: #dc3545; font-weight: bold; }
        .table-container { max-height: 600px; overflow-y: auto; }
        thead th { position: sticky; top: 0; background-color: #f8f9fa !important; z-index: 1; border-bottom: 2px solid #dee2e6;}
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4 px-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hệ thống đăng ký môn học</h2>
        <div>
            <form action="/sync-courses" method="post" style="display: inline;">
                <button type="submit" class="btn btn-warning me-2">Làm mới danh sách</button>
            </form>
            <a href="/logout" class="btn btn-danger">Đăng xuất</a>
        </div>
    </div>

    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" title="Đóng thông báo"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" title="Đóng thông báo"></button>
    </div>

    <div class="filter-section mb-4 shadow-sm">
        <div class="row g-3 align-items-center">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm mã môn, tên môn, nhóm, tổ, giảng viên...">
            </div>
            <div class="col-md-6 d-flex gap-3">
                <div class="form-check pt-2">
                    <input class="form-check-input" type="checkbox" id="availableOnly">
                    <label class="form-check-label" for="availableOnly">Chỉ hiển thị môn còn slot</label>
                </div>
            </div>
        </div>
        
        <div class="mt-3 d-flex gap-2">
            <button type="button" id="selectAllBtn" class="btn btn-light border">Chọn tất cả</button>
            <button type="button" id="deselectAllBtn" class="btn btn-light border">Bỏ chọn tất cả</button>
        </div>
    </div>

    <form action="/register-batch" method="post">
        
        <div class="mb-3">
            <button type="submit" class="btn btn-success btn-lg shadow-sm">Đăng ký các môn đã chọn</button>
        </div>

        <div class="table-container shadow-sm bg-white border rounded">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="text-center">Chọn</th>
                        <th>Mã môn</th>
                        <th>Tên môn</th>
                        <th>Nhóm</th>
                        <th>Tổ</th>
                        <th>Số TC</th>
                        <th>Thời gian học</th>
                        <th>Giảng viên</th>
                        <th>SL còn lại</th>
                    </tr>
                </thead>
                <tbody id="courseTableBody">
                    <tr th:each="course : ${allCourses}" class="course-row">
                        
                        <td class="text-center">
                            <input class="form-check-input course-checkbox" type="checkbox" name="courseIds" 
                                   th:value="${course.id}" style="transform: scale(1.3);"
                                   th:title="'Chọn môn ' + ${course.courseName}" aria-label="Chọn môn học">
                        </td>
                        
                        <td th:text="${course.courseCode}" class="fw-bold"></td>
                        <td th:text="${course.courseName}"></td>
                        <td th:text="${course.groupName}"></td>
                        <td th:text="${course.subGroup}"></td>
                        <td th:text="${course.credits}"></td>
                        
                        <td th:utext="${course.scheduleTime}" style="font-size: 0.9em;"></td>
                        
                        <td th:text="${course.lecturer}"></td>
                        
                        <td th:with="slotsLeft=${course.capacity - course.enrolled}"
                            th:text="${slotsLeft + '/' + course.capacity}"
                            th:classappend="${slotsLeft > 0} ? 'available-slots' : 'full-slots'"
                            class="slots-column"
                            th:attr="data-slots=${slotsLeft}">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </form>

    <div class="mt-5">
        <h4>My Schedule</h4>
        <ul class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center" th:each="record : ${myRecords}">
                <div>
                    <strong th:text="${record.course.courseCode}"></strong> - 
                    <span th:text="${record.course.courseName}"></span>
                </div>
                <form action="/drop" method="post" style="margin: 0;">
                    <input type="hidden" name="courseId" th:value="${record.course.id}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Hủy</button>
                </form>
            </li>
        </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const searchInput = document.getElementById('searchInput');
        const availableOnlyCb = document.getElementById('availableOnly');
        const rows = document.querySelectorAll('.course-row');

        function applyFilters() {
            const searchText = searchInput.value.toLowerCase();
            const mustHaveSlots = availableOnlyCb.checked;

            rows.forEach(row => {
                const textContent = row.textContent.toLowerCase();
                const slotsLeft = parseInt(row.querySelector('.slots-column').getAttribute('data-slots'));
                
                let matchesSearch = textContent.includes(searchText);
                let matchesSlots = mustHaveSlots ? (slotsLeft > 0) : true;

                if (matchesSearch && matchesSlots) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                    row.querySelector('.course-checkbox').checked = false;
                }
            });
        }

        searchInput.addEventListener('keyup', applyFilters);
        availableOnlyCb.addEventListener('change', applyFilters);

        document.getElementById('selectAllBtn').addEventListener('click', () => {
            rows.forEach(row => {
                if (row.style.display !== 'none') {
                    row.querySelector('.course-checkbox').checked = true;
                }
            });
        });

        document.getElementById('deselectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.course-checkbox').forEach(cb => cb.checked = false);
        });
    });
</script>

</body>
</html>
