<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - HANU Auto Reg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div style="max-width: 400px; margin: auto;" class="card shadow p-4">
        <h3 class="text-center">Đăng nhập hệ thống QLDT</h3>
        <p style="color:red" th:text="${error}"></p>
        <form action="/login" method="post">
            <input type="text" name="studentId" class="form-control mb-3" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Mật khẩu" required>
            <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>
        </form>
    </div>
</body>
</html>
